{% extends "base.html" %}

{% block title %}My Profile - {{ app_name }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
        <div class="bg-primary px-6 py-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-white">My Profile</h2>
            <span class="px-3 py-1 text-xs rounded-full bg-white font-bold text-primary">
                {{ current_user.role.replace('_', ' ').title() }}
            </span>
        </div>

        <form action="{{ url_for('users.profile') }}" method="POST" class="p-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username (Read-Only)</label>
                <input type="text" id="username" value="{{ current_user.username }}" readonly disabled
                    class="w-full rounded-md border-gray-300 bg-gray-100 shadow-sm text-gray-500 cursor-not-allowed">
            </div>

            <div class="mb-4">
                <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="full_name" id="full_name" value="{{ current_user.full_name }}" required
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
            </div>

            <div class="mb-6">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" value="{{ current_user.email or '' }}"
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
            </div>

            <!-- Password Change Section -->
            <div class="mb-6 bg-gray-50 p-4 rounded-md border border-gray-200">
                <h3 class="text-sm font-bold text-gray-800 mb-3 uppercase tracking-wider">Change Password</h3>
                
                <div class="mb-4">
                    <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                    <input type="password" name="current_password" id="current_password"
                        placeholder="Required to set a new password"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
                </div>

                <div class="mb-4">
                    <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" name="new_password" id="new_password" minlength="8"
                        placeholder="At least 8 characters"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
                </div>
                
                <div class="mb-2">
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" minlength="8"
                        placeholder="Re-enter new password"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
                </div>
                <p class="text-xs text-gray-500 mt-2">Leave all password fields empty if you do not wish to change your password.</p>
            </div>

            <div class="flex items-center justify-end border-t pt-4">
                <a href="{{ url_for('dashboard.index') }}"
                    class="text-gray-600 hover:text-gray-900 mr-4 transition-colors">Cancel</a>
                <button type="submit"
                    class="bg-primary hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
