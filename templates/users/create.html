{% extends "base.html" %}

{% block title %}Create User - {{ app_name }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
        <div class="bg-indigo-600 px-6 py-4">
            <h2 class="text-xl font-bold text-white">Create New User</h2>
        </div>

        <form action="{{ url_for('users.create_user') }}" method="POST" class="p-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-4">
                <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="full_name" id="full_name" required
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required minlength="3"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    <p class="text-xs text-gray-500 mt-1">Foundational login ID (e.g., jsmith)</p>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email (Optional)</label>
                    <input type="email" name="email" id="email"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="password" required minlength="8"
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                <p class="text-xs text-gray-500 mt-1">Must be at least 8 characters</p>
            </div>

            <div class="mb-6">
                <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <select name="role" id="role" required
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                    onchange="toggleOutletField()">
                    <option value="">Select a Role</option>
                    <option value="super_admin">Super Admin (Full Access)</option>
                    <option value="general_manager">General Manager (Dashboard & Reports)</option>
                    <option value="accountant">Accountant (Financials)</option>
                    <option value="outlet_admin">Outlet Admin (Manage Specific Outlet)</option>
                    <option value="sales_rep">Sales Rep (POS & Personal Sales)</option>
                </select>
            </div>

            <div id="outlet_field" class="mb-6 hidden">
                <label for="outlet_id" class="block text-sm font-medium text-gray-700 mb-1">Assign to Outlet</label>
                <select name="outlet_id" id="outlet_id"
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    <option value="">Select an Outlet</option>
                    {% for outlet in outlets %}
                    <option value="{{ outlet.id }}">{{ outlet.name }} ({{ outlet.code }})</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-red-500 mt-1">Required for Outlet Admins and Sales Reps</p>
            </div>

            <div class="flex items-center justify-end border-t pt-4">
                <a href="{{ url_for('users.list_users') }}" class="text-gray-600 hover:text-gray-900 mr-4">Cancel</a>
                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline">
                    Create User
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleOutletField() {
        const role = document.getElementById('role').value;
        const outletField = document.getElementById('outlet_field');
        const outletSelect = document.getElementById('outlet_id');

        if (role === 'outlet_admin' || role === 'sales_rep') {
            outletField.classList.remove('hidden');
            outletSelect.required = true;
        } else {
            outletField.classList.add('hidden');
            outletSelect.required = false;
            outletSelect.value = "";
        }
    }
</script>
{% endblock %}
