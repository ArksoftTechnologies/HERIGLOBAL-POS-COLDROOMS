{% extends "base.html" %}

{% block title %}Declare Cash Collection{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
        <a href="{{ url_for('remittance.index') }}" class="text-gray-500 hover:text-gray-700 flex items-center mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back to Dashboard
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Declare Cash Collection</h1>
        <p class="text-gray-500 mt-1">Record distinct cash collections received from sales.</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6" x-data="collectionForm()">
        <form @submit.prevent="submitForm">
            <div class="space-y-6">

                <!-- Date & Amount Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Collection Date *</label>
                        <input type="date" x-model="collection_date"
                            class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500"
                            :class="{'border-red-300': v.collection_date.error}">
                        <p x-show="v.collection_date.error" x-text="v.collection_date.message"
                            class="mt-1 text-xs text-red-600"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Amount (₦) *</label>
                        <input type="number" step="0.01" x-model="amount"
                            class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500 text-lg font-semibold"
                            placeholder="0.00" :class="{'border-red-300': v.amount.error}">
                        <p x-show="v.amount.error" x-text="v.amount.message" class="mt-1 text-xs text-red-600"></p>
                    </div>
                </div>

                <!-- Collection Type -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Collection Type *</label>
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="cash" x-model="collection_type" class="sr-only peer">
                            <div
                                class="px-4 py-2 text-center rounded-lg border border-gray-200 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-gray-50 transition-colors">
                                <span class="text-sm font-medium">Cash</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="bank_transfer" x-model="collection_type"
                                class="sr-only peer">
                            <div
                                class="px-4 py-2 text-center rounded-lg border border-gray-200 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-gray-50 transition-colors">
                                <span class="text-sm font-medium">Bank Txf</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="mobile_money" x-model="collection_type"
                                class="sr-only peer">
                            <div
                                class="px-4 py-2 text-center rounded-lg border border-gray-200 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-gray-50 transition-colors">
                                <span class="text-sm font-medium">Mobile</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="other" x-model="collection_type"
                                class="sr-only peer">
                            <div
                                class="px-4 py-2 text-center rounded-lg border border-gray-200 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-gray-50 transition-colors">
                                <span class="text-sm font-medium">Other</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Details Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Payment Mode (Optional)</label>
                        <select x-model="payment_mode_id"
                            class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                            <option value="">Select mode...</option>
                            {% for mode in payment_modes %}
                            <option value="{{ mode.id }}">{{ mode.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Transaction Ref (Optional)</label>
                        <input type="text" x-model="transaction_reference"
                            class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500"
                            placeholder="e.g. TXN-123456">
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Source Description *</label>
                    <textarea x-model="source_description" rows="3"
                        class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500"
                        placeholder="Describe where/how this cash was collected (e.g. Sales from morning shift)"
                        :class="{'border-red-300': v.source.error}"></textarea>
                    <p x-show="v.source.error" x-text="v.source.message" class="mt-1 text-xs text-red-600"></p>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notes (Optional)</label>
                    <textarea x-model="notes" rows="2"
                        class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500"></textarea>
                </div>

                <!-- Sales Rep Selection (Admins only) -->
                {% if current_user.role in ['outlet_admin', 'super_admin'] %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Record On Behalf Of (Sales Rep)</label>
                    <select x-model="sales_rep_id"
                        class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                        <option value="">Select sales rep...</option>
                        {% for rep in sales_reps %}
                        <option value="{{ rep.id }}">{{ rep.first_name }} {{ rep.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <!-- Submit Button -->
                <div class="pt-4 flex items-center justify-end">
                    <button type="submit"
                        class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50 disabled:cursor-not-allowed"
                        :disabled="processing">
                        <span x-show="processing" class="mr-2">
                            <i class="animate-spin" data-lucide="loader-2"></i>
                        </span>
                        Declare Collection
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    function collectionForm() {
        return {
            collection_date: '{{ today }}',
            amount: '',
            collection_type: 'cash',
            payment_mode_id: '',
            transaction_reference: '',
            source_description: '',
            notes: '',
            sales_rep_id: '',
            processing: false,
            v: {
                collection_date: { error: false, message: '' },
                amount: { error: false, message: '' },
                source: { error: false, message: '' }
            },

            validate() {
                let valid = true;

                // Clear errors
                this.v.collection_date.error = false;
                this.v.amount.error = false;
                this.v.source.error = false;

                // Date
                if (!this.collection_date) {
                    this.v.collection_date.error = true;
                    this.v.collection_date.message = 'Date is required';
                    valid = false;
                } else {
                    const d = new Date(this.collection_date);
                    const today = new Date('{{ today }}');
                    // Simple check
                    if (d > today) {
                        this.v.collection_date.error = true;
                        this.v.collection_date.message = 'Date cannot be in future';
                        valid = false;
                    }
                }

                // Amount
                if (!this.amount || parseFloat(this.amount) <= 0) {
                    this.v.amount.error = true;
                    this.v.amount.message = 'Enter valid amount';
                    valid = false;
                }
                if (parseFloat(this.amount) > 10000000) {
                    this.v.amount.error = true;
                    this.v.amount.message = 'Amount too large';
                    valid = false;
                }

                // Description
                if (this.source_description.length < 10) {
                    this.v.source.error = true;
                    this.v.source.message = 'Description must be at least 10 characters';
                    valid = false;
                }

                return valid;
            },

            async submitForm() {
                if (!this.validate()) return;

                this.processing = true;

                try {
                    const response = await fetch("{{ url_for('remittance.declare_collection') }}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token() }}'
                        },
                        body: JSON.stringify({
                            collection_date: this.collection_date,
                            amount: this.amount,
                            collection_type: this.collection_type,
                            payment_mode_id: this.payment_mode_id,
                            transaction_reference: this.transaction_reference,
                            source_description: this.source_description,
                            notes: this.notes,
                            sales_rep_id: this.sales_rep_id || null
                        })
                    });

                    const result = await response.json();

                    if (result.success) {
                        window.location.href = result.redirect;
                    } else {
                        alert(result.error || 'Failed to declare collection');
                    }
                } catch (e) {
                    console.error(e);
                    alert('An error occurred');
                } finally {
                    this.processing = false;
                }
            }
        }
    }
</script>
{% endblock %}
